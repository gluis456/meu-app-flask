{% extends "base.html" %}
{% block content %}

<h2 class="text-2xl font-bold mb-6">
  {% if cliente %}Editar Cliente{% else %}Novo Cliente{% endif %}
</h2>

<div class="card max-w-2xl">
  <form method="POST" class="flex flex-col gap-4">

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="text-sm text-slate-400">Nome *</label>
        <input name="nome" required value="{{ cliente.nome if cliente else '' }}"/>
      </div>
      <div>
        <label class="text-sm text-slate-400">E-mail *</label>
        <input name="email" type="email" required value="{{ cliente.email if cliente else '' }}"/>
      </div>
      <div>
        <label class="text-sm text-slate-400">Telefone</label>
        <input name="telefone" value="{{ cliente.telefone if cliente else '' }}"/>
      </div>
      <div>
        <label class="text-sm text-slate-400">Empresa</label>
        <input name="empresa" value="{{ cliente.empresa if cliente else '' }}"/>
      </div>
      <div>
        <label class="text-sm text-slate-400">Status</label>
        <select name="status">
          {% for s in ["Lead", "Ativo", "Inativo"] %}
            <option value="{{ s }}" {% if cliente and cliente.status == s %}selected{% endif %}>{{ s }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label class="text-sm text-slate-400">Valor do Deal (R$)</label>
        <input name="valor_deal" type="number" step="0.01" value="{{ cliente.valor_deal if cliente else '0' }}"/>
      </div>
    </div>

    <div class="flex gap-3 mt-2">
      <button type="submit" class="btn-primary">
        {% if cliente %}Salvar Alterações{% else %}Cadastrar Cliente{% endif %}
      </button>
      <a href="/clientes" class="btn-primary" style="background:#334155">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
